<form [formGroup]="formulario" (ngSubmit)="salvar()" class="container form-control">
    <label for="nome">Nome do EPI</label>
    <input id="nome" type="text" formControlName="nome">
    <label for="categoria">Categoria</label>
    <input id="categoria" type="text" formControlName="categoria">
    <label for="ca">CA</label>
    <input id="ca" type="text" formControlName="ca">
    <button type="submit" class="btn btn-danger ms-2">Cadastrar</button>
</form>
